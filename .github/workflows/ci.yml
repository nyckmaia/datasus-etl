name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - 'VERSION'        # handled by release.yml
      - 'site/**'
      - 'docs/**'        # rebuilt-site commits from release.yml
      - 'CHANGELOG.md'
      - '**.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal CI: only confirms the React SPA still builds cleanly. Python lint,
# mypy, and pytest are intentionally not run here — the release pipeline
# exercises the Python code end-to-end via Nuitka builds.
jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install web-ui deps
        working-directory: web-ui
        run: bun install --frozen-lockfile

      - name: Lint (tsc --noEmit)
        working-directory: web-ui
        run: bun run lint

      - name: Build SPA
        working-directory: web-ui
        run: bun run build

      - name: Verify SPA output
        run: test -f src/datasus_etl/web/static/index.html
