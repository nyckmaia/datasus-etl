name: Pages Deploy

# Builds the static marketing site (Astro source under /site) inside CI and
# deploys to GitHub Pages. The /docs build output is NOT committed back —
# Actions is the only thing that touches Pages, so the local working tree
# never falls out of sync after a push.
#
# Prerequisite: Settings → Pages → Source must be set to "GitHub Actions"
# (not "Deploy from a branch").

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'VERSION'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

# Only one Pages deploy at a time. Do not cancel in-progress — each deploy
# represents a complete, published version of the site. Shared with the
# `pages` job in release.yml so a release rebuild and a site-only push
# serialize cleanly instead of racing.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build site and deploy to GitHub Pages
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Read VERSION
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install site deps
        working-directory: site
        run: npm ci

      - name: Build site into /docs
        working-directory: site
        env:
          SITE_VERSION: ${{ steps.version.outputs.version }}
          SITE_REPO: nyckmaia/datasus-etl
        run: npm run build

      - name: Verify build output
        run: test -f docs/index.html

      - uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5
